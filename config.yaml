# v0 scope: BetterBrain's search+escalation runs headlessly (read-only), but
# gap-logging and PKR-drafting stay a deliberate, interactive follow-up action --
# see .claude/settings.json in the BetterBrain repo and SKILL.md's own notes.
betterbrain:
  repoPath: /Users/pagustin/dev/betterbrain
  # 900s (15 min): the 500s default killed the 2026-07-20 #product UKG-sync
  # cascade mid-run (it needs the full Confluence/Aha/GitHub escalation when the
  # corpus has nothing). Bump if timeouts recur; timeouts now DM a heads-up.
  cliTimeoutSeconds: 900
